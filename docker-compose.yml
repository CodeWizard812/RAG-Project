
services:

  db:
    image: postgres:15-alpine
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: rag_web
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db      # Override localhost — inside Docker, use service name
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      USE_REDIS: "true"
    volumes:
      - chroma_data:/app/chroma_store   # Persist ChromaDB across restarts
      - ./:/app                          # Hot reload in development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "/app/entrypoint.sh"]

volumes:
  postgres_data:
  chroma_data: